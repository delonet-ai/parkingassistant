name: parkingassistant

services:
  postgres:
    image: postgres:16-bookworm
    container_name: parkingassistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkingassistant}
      POSTGRES_USER: ${POSTGRES_USER:-parkingassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkingassistant}
      TZ: ${APP_TIMEZONE:-Europe/Moscow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /opt/git/parkingassistant/staging/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
      target: runtime
    image: parkingassistant-api:local
    container_name: parkingassistant-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ROLE: api
      NODE_ENV: ${NODE_ENV:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-parkingassistant}:${POSTGRES_PASSWORD:-parkingassistant}@postgres:5432/${POSTGRES_DB:-parkingassistant}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      MAP_STORAGE_PATH: /app/storage/maps
      IMPORT_STORAGE_PATH: /app/storage/imports
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - /opt/git/parkingassistant/staging/maps:/app/storage/maps
      - /opt/git/parkingassistant/staging/imports:/app/storage/imports
      - /opt/git/parkingassistant/staging/logs:/app/storage/logs
    command: ["npm", "run", "api:start"]

  admin-web:
    build:
      context: .
      dockerfile: infra/docker/admin-web.Dockerfile
      target: runtime
    image: parkingassistant-admin-web:local
    container_name: parkingassistant-admin-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3100
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      API_BASE_URL: http://api:3000
    ports:
      - "${ADMIN_WEB_PORT:-3100}:3100"
    volumes:
      - /opt/git/parkingassistant/staging/logs:/app/storage/logs
    command: ["/bin/sh", "-lc", "echo 'Admin Web placeholder: replace with real start command'; sleep infinity"]

  bot-adapter:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
      target: runtime
    image: parkingassistant-bot-adapter:local
    container_name: parkingassistant-bot-adapter
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      APP_ROLE: bot-adapter
      NODE_ENV: ${NODE_ENV:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      PORT: 3200
      API_BASE_URL: http://api:3000
      YANDEX_MESSENGER_BOT_TOKEN: ${YANDEX_MESSENGER_BOT_TOKEN:-change-me}
      YANDEX_MESSENGER_SIGNING_SECRET: ${YANDEX_MESSENGER_SIGNING_SECRET:-change-me}
    ports:
      - "${BOT_ADAPTER_PORT:-3200}:3200"
    volumes:
      - /opt/git/parkingassistant/staging/logs:/app/storage/logs
    command: ["/bin/sh", "-lc", "echo 'Bot Adapter placeholder: replace with real start command'; sleep infinity"]

  jobs:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
      target: runtime
    image: parkingassistant-jobs:local
    container_name: parkingassistant-jobs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ROLE: jobs
      NODE_ENV: ${NODE_ENV:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      DATABASE_URL: postgresql://${POSTGRES_USER:-parkingassistant}:${POSTGRES_PASSWORD:-parkingassistant}@postgres:5432/${POSTGRES_DB:-parkingassistant}
      JOBS_SCHEDULER_ENABLED: ${JOBS_SCHEDULER_ENABLED:-true}
    volumes:
      - /opt/git/parkingassistant/staging/logs:/app/storage/logs
      - /opt/git/parkingassistant/staging/backups:/app/storage/backups
    command: ["/bin/sh", "-lc", "echo 'Jobs placeholder: replace with real scheduler command'; sleep infinity"]
